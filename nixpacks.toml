[phases.setup]
nixPkgs = [
  "php81",
  "php81Packages.composer",
  "nodejs_20"
]

[phases.install]
cmds = [
  "composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader",
  "npm install"
]

[phases.build]
cmds = [
  "npm run build"
]

[start]
cmd = "sh -lc 'php artisan serve --host=0.0.0.0 --port=${PORT:-8080}'"
